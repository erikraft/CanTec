<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Cantina Pop Art</title>
     <link rel="stylesheet" href="../css/style.css">
     <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--text-main);
            z-index: 20;
        }

        header img {
            height: 60px;
            margin-bottom: 10px;
        }

        header h1 {
            color: var(--vermelho);
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .register-container {
            position: relative;
            width: 380px !important;
            z-index: 10;
        }

        .footer-text {
            margin-top: 15px;
            text-align: center;
        }

        .footer-text a {
            color: var(--vermelho);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        #toggleForm {
            display: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--vermelho);
            color: white;
            border: 3px solid var(--text-main);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Unbounded', sans-serif;
            margin-top: 20px;
        }

        button:hover {
            background: var(--laranja);
            transform: scale(1.02);
        }

        .subtitle {
            color: var(--text-main);
            font-size: 14px;
            margin-bottom: 20px;
        }

        page-footer {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            text-align: center;
            border-top: 4px solid var(--text-main);
            font-size: 11px;
            color: var(--text-main);
        }

        .food-area {
            position: fixed;
        }
     </style>
</head>
<body>

    <div class="food-area">
        <div class="food-item burger"></div>
        <div class="food-item pizza"></div>
        <div class="food-item fries"></div>
        <div class="food-item hotdog"></div>
        <div class="food-item burger"></div>
        <div class="food-item pizza"></div>
    </div>

    <header>
        <img src="../img/logo.png" alt="Logo Cantina Pop Art">
        <h1>Cantina Pop Art</h1>
    </header>

    <div class="main-content">
        <!-- Formulário de Registro -->
        <div class="register-container" id="registerForm">
            <h2>Consumo consciente, gestão eficiente</h2>
            <p class="subtitle">Crie sua conta na cantina mais tech</p>
            
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label for="nomeReg">Nome Completo</label>
                    <input type="text" id="nomeReg" name="nomeReg" placeholder="Seu nome aqui" required>
                </div>
                
                <div class="input-group">
                    <label for="emailReg">E-mail de Cadastro</label>
                    <input type="email" id="emailReg" name="emailReg" placeholder="exemplo@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="senhaReg">Senha Super Segura</label>
                    <input type="password" id="senhaReg" name="senhaReg" placeholder="********" required>
                </div>
                
                <button type="submit">Bora Pedir!</button>
            </form>

            <div class="footer-text">
                Já é de casa? <a onclick="toggleForms()">Fazer Login</a>
            </div>
        </div>

        <!-- Formulário de Login -->
        <div class="register-container" id="loginForm" style="display: none;">
            <h2>Bem-vindo de Volta!</h2>
            <p class="subtitle">Acesse sua conta na cantina</p>
            
            <form id="signinForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="emailLog">E-mail</label>
                    <input type="email" id="emailLog" name="emailLog" placeholder="seu.email@exemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="senhaLog">Senha</label>
                    <input type="password" id="senhaLog" name="senhaLog" placeholder="********" required>
                </div>
                
                <button type="submit">Entrar</button>
            </form>

            <div class="footer-text">
                Novo por aqui? <a onclick="toggleForms()">Criar Conta</a>
            </div>
        </div>
    </div>

    <footer style="background: rgba(255, 255, 255, 0.95); padding: 15px; text-align: center; border-top: 4px solid var(--text-main); font-size: 11px; color: var(--text-main);">
        <p>&copy; 2026 Cantina Pop Art. Desenvolvido com tecnologia e eficiência.</p>
    </footer>

    <script>
        function toggleForms() {
            const registerForm = document.getElementById('registerForm');
            const loginForm = document.getElementById('loginForm');
            
            registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
            loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
        }

        function handleSignup(event) {
            event.preventDefault();
            
            const userData = {
                nome: document.getElementById('nomeReg').value,
                email: document.getElementById('emailReg').value,
                senha: document.getElementById('senhaReg').value
            };

            // Salvar no localStorage
            localStorage.setItem('userAccount', JSON.stringify(userData));
            localStorage.setItem('userSession', 'logado');

            // Redirecionar para dashboard
            window.location.href = 'dashboard.html';
        }

        function handleLogin(event) {
            event.preventDefault();
            
            // Simular login verificando se existe uma conta
            const email = document.getElementById('emailLog').value;
            const password = document.getElementById('senhaLog').value;

            // Para fins de demonstração, aceitar qualquer email/senha válidos
            localStorage.setItem('userSession', 'logado');
            localStorage.setItem('loginEmail', email);

            // Redirecionar para dashboard
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
