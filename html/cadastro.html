<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Cantina Pop Art</title>
     <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>

    <div class="food-area">
        <div class="food-item burger"></div>
        <div class="food-item pizza"></div>
        <div class="food-item fries"></div>
        <div class="food-item hotdog"></div>
        <div class="food-item burger"></div>
        <div class="food-item pizza"></div>
    </div>


    <div class="register-container">
        <h2>Consumo consciente, gestão eficiente</h2>
        <p class="subtitle">Crie sua conta na cantina mais tech</p>
        
        <form action="#" method="post">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome aqui" required>
            </div>
            
            <div class="input-group">
                <label for="email">E-mail de Cadastro</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha Super Segura</label>
                <input type="password" id="senha" name="senha" placeholder="********" required>
            </div>
            
            <button type="submit">Bora Pedir!</button>
        </form>

        <div class="footer-text">
            Já é de casa? <a href="#">Fazer Login</a>
        </div>
    </div>

</body>
</html>
