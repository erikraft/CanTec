<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <meta name="theme-color" content="#ff6600"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="CanTec"/>
    <title>Painel da Cantina - CanTec</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="img/logo.png">
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/cursor.css">
    <style>
    :root {
      --brand: #ff6600;
      --brand-r: #ff3333;
      --brand-g: #ffcc00;
      --bg: #050508;
      --bg-card: rgba(255, 255, 255, .045);
      --glass: rgba(10, 10, 20, .82);
      --border: rgba(255, 102, 0, .22);
      --border-hi: rgba(255, 102, 0, .55);
      --txt: #f8fafc;
      --txt-mid: rgba(248, 250, 252, .6);
      --txt-low: rgba(248, 250, 252, .28);
      --success: #22c55e;
      --danger: #ef4444;
      --hdr: 66px;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth
    }

    body {
      min-height: 100svh;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--txt);
      overflow-x: hidden;
      padding-top: var(--hdr);
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none
    }

    .aurora {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden
    }

    .aurora span {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .1;
      animation: drift ease-in-out infinite alternate
    }

    .aurora span:nth-child(1) {
      width: 600px;
      height: 400px;
      background: #ff2200;
      top: -100px;
      left: -100px;
      animation-duration: 14s
    }

    .aurora span:nth-child(2) {
      width: 500px;
      height: 500px;
      background: #ff6600;
      top: 30%;
      right: -150px;
      animation-duration: 18s;
      animation-delay: -5s
    }

    .aurora span:nth-child(3) {
      width: 400px;
      height: 350px;
      background: #ffbb00;
      bottom: -80px;
      left: 28%;
      animation-duration: 12s;
      animation-delay: -8s
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(55px, 40px) scale(1.2)
      }
    }

    .grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: linear-gradient(rgba(255, 255, 255, .018) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .018) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 25%, transparent 100%)
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--hdr);
      z-index: 100;
      background: rgba(8, 8, 16, .88);
      backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .5);
    }

    .hdr-brand {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .hdr-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 9px;
      filter: drop-shadow(0 2px 6px rgba(255, 102, 0, .4))
    }

    .hdr-name {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.04em;
      background: linear-gradient(135deg, #ff4444, #ff6600 55%, #ffcc00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .hdr-sub {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--txt-low);
      margin-top: 1px
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .db-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .68rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(255, 100, 0, .1);
      border: 1px solid rgba(255, 100, 0, .22);
      color: rgba(255, 160, 60, .75);
    }

    .db-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ffaa00;
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .35;
        transform: scale(.6)
      }
    }

    .page {
      position: relative;
      z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp .7s .15s ease forwards;
    }

    .page-title-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(255, 60, 0, .25), rgba(255, 120, 0, .12));
      border: 1px solid rgba(255, 102, 0, .35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--brand);
    }

    .page-title h2 {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -.03em
    }

    .page-title p {
      font-size: .8rem;
      color: var(--txt-mid);
      margin-top: 1px
    }

    .panel {
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp .8s .3s ease forwards;
    }

    .panel-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 102, 0, .04);
    }

    .panel-hdr-left {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .panel-hdr-left i {
      color: var(--brand);
      font-size: .95rem
    }

    .panel-hdr-left span {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--txt-mid)
    }

    .count-chip {
      font-size: .72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      background: rgba(255, 102, 0, .15);
      border: 1px solid rgba(255, 102, 0, .3);
      color: var(--brand);
    }

    .reg-form {
      padding: 1.4rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .field label {
      font-size: .68rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--txt-mid);
      margin-bottom: 4px;
    }

    .field select {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 9px;
      padding: .7rem .9rem;
      color: var(--txt);
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .2s, background .2s;
      outline: none;
      cursor: pointer;
      width: 100%;
    }

    .field select:focus {
      border-color: rgba(255, 102, 0, .5);
      background: rgba(255, 102, 0, .06);
    }

    .field select option {
      background: #14141e;
      color: var(--txt)
    }

    .toast {
      margin: .6rem 1.5rem 0;
      padding: .7rem 1rem;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 600;
      display: none;
      animation: fadeUp .4s ease forwards;
    }

    .toast.ok {
      background: rgba(34, 197, 94, .14);
      border: 1px solid rgba(34, 197, 94, .35);
      color: #4ade80
    }

    .toast.err {
      background: rgba(239, 68, 68, .14);
      border: 1px solid rgba(239, 68, 68, .35);
      color: #f87171
    }

    .search-bar {
      padding: .9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .7rem;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap i {
      position: absolute;
      left: .85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--txt-low);
      font-size: .85rem;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      padding: .6rem .9rem .6rem 2.2rem;
      color: var(--txt);
      font-size: .85rem;
      font-family: inherit;
      transition: border-color .2s;
      outline: none;
    }

    .search-wrap input:focus {
      border-color: rgba(255, 102, 0, .4)
    }

    .search-wrap input::placeholder {
      color: var(--txt-low)
    }

    .table-wrap {
      overflow-x: auto
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    thead tr {
      background: rgba(255, 102, 0, .06)
    }

    thead th {
      padding: .75rem 1.2rem;
      text-align: left;
      font-size: .67rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255, 140, 60, .7);
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      transition: background .15s;
      animation: rowIn .35s ease forwards;
      opacity: 0;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateX(-8px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    tbody tr:hover {
      background: rgba(255, 102, 0, .06)
    }

    tbody td {
      padding: .85rem 1.2rem;
      font-size: .875rem;
      color: var(--txt);
      vertical-align: middle;
    }

    .td-num {
      font-size: .75rem;
      font-weight: 700;
      color: var(--txt-low);
      letter-spacing: .04em;
    }

    .td-name {
      font-weight: 600
    }

    .td-turma {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 6px;
      background: rgba(255, 102, 0, .1);
      border: 1px solid rgba(255, 102, 0, .25);
      color: rgba(255, 160, 60, .85);
    }

    .td-date {
      font-size: .78rem;
      color: var(--txt-mid)
    }

    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .7rem;
      letter-spacing: .06em;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-status.ativo {
      background: rgba(34, 197, 94, .12);
      border: 1px solid rgba(34, 197, 94, .3);
      color: #4ade80;
    }

    .badge-status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor
    }

    .btn-del {
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .25);
      color: #f87171;
      border-radius: 7px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: .75rem;
      transition: background .2s, transform .15s;
    }

    .btn-del:hover {
      background: rgba(239, 68, 68, .22);
      transform: scale(1.05)
    }

    .empty {
      padding: 3.5rem 1.5rem;
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
    }

    .empty-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--txt-low);
    }

    .empty p {
      font-size: .9rem;
      color: var(--txt-mid)
    }

    .empty small {
      font-size: .78rem;
      color: var(--txt-low)
    }

    .db-notice {
      margin: 1.5rem 0 0;
      padding: 1rem 1.3rem;
      background: rgba(255, 170, 0, .06);
      border: 1px dashed rgba(255, 170, 0, .3);
      border-radius: 10px;
      display: flex;
      align-items: flex-start;
      gap: .9rem;
      opacity: 0;
      animation: fadeUp .7s .5s ease forwards;
    }

    .db-notice i {
      color: #ffaa00;
      font-size: 1rem;
      margin-top: 1px;
      flex-shrink: 0
    }

    .db-notice p {
      font-size: .8rem;
      color: rgba(255, 220, 80, .7);
      line-height: 1.6
    }

    .db-notice strong {
      color: #ffcc00
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media(max-width:640px) {
      header {
        padding: 0 1.1rem
      }

      .hdr-sub,
      .db-badge {
        display: none
      }

      .page {
        padding: 1.4rem 1rem 3rem
      }
    }
  </style>
</head>

<body>

  <canvas id="bg"></canvas>
  <div class="aurora"><span></span><span></span><span></span></div>
  <div class="grid"></div>

  <header>
    <div class="hdr-brand">
      <img src="img/logo.png" alt="CanTec" class="hdr-logo" onerror="this.style.display='none'">
      <div>
        <div class="hdr-name">CanTec</div>
        <div class="hdr-sub">Painel da Cantina</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="db-badge">
        <div class="db-dot"></div>
        Turmas
      </div>
    </div>
  </header>

  <div class="page">

    <div class="page-title">
      <div class="page-title-icon"><i class="fas fa-users"></i></div>
      <div>
        <h2>Gerenciamento de Turmas</h2>
        <p>Visualize os alunos por turma</p>
      </div>
    </div>

    <div class="panel">

      <div class="panel-hdr">
        <div class="panel-hdr-left">
          <i class="fas fa-school"></i>
          <span>Turmas</span>
        </div>
        <span class="count-chip" id="countChip">0 turmas</span>
      </div>

      <div id="toast" class="toast"></div>

      <div class="reg-form">
        <div class="field">
          <label><i class="fas fa-chalkboard-user" style="margin-right:4px"></i>Selecione a Turma</label>
          <select id="inputTurma" onchange="filtrarPorTurma()">
            <option value="" disabled selected>Selecione uma turma</option>
            <option value="1ºA">1º A</option>
            <option value="1ºB">1º B</option>
            <option value="2ºA">2º A</option>
            <option value="2ºB">2º B</option>
            <option value="3ºA">3º A</option>
            <option value="3ºB">3º B</option>
            <option value="4ºA">4º A</option>
            <option value="5ºA">5º A</option>
          </select>
        </div>
      </div>

      <div class="search-bar">
        <div class="search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Buscar aluno por nome…" oninput="renderTable()" />
        </div>
      </div>

      <div class="table-wrap">
        <table id="alunoTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome do Aluno</th>
              <th>Turma</th>
              <th>Status</th>
              <th>Cadastrado em</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty" id="emptyState">
          <div class="empty-icon"><i class="fas fa-users"></i></div>
          <p>Selecione uma turma</p>
          <small>Escolha uma turma no campo acima para ver os alunos</small>
        </div>
      </div>

    </div>

    <div class="db-notice">
      <i class="fas fa-database"></i>
      <p>
        <strong>Visualização por turmas.</strong>
        Selecione uma turma para ver o Banco.
      </p>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('bg'), ctx = canvas.getContext('2d');
    let W, H, P = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight }
    resize(); window.addEventListener('resize', resize);
    const N = 60; const mk = () => ({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .28, vy: (Math.random() - .5) * .28, r: Math.random() * 1.2 + .3, a: Math.random() });
    for (let i = 0; i < N; i++)P.push(mk());
    function draw() {
      ctx.clearRect(0, 0, W, H);
      P.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0; if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,102,0,${.25 + p.a * .22})`; ctx.fill();
        for (let j = i + 1; j < N; j++) {
          const dx = p.x - P[j].x, dy = p.y - P[j].y, d = Math.hypot(dx, dy);
          if (d < 120) {
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(P[j].x, P[j].y);
            ctx.strokeStyle = `rgba(255,102,0,${.08 * (1 - d / 120)})`; ctx.lineWidth = .5; ctx.stroke()
          }
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>

  <script>
    const STORAGE_KEY = 'cantec_alunos_v2';
    let alunos = [];
    let turmaSelecionada = '';

    function loadAlunos() {
      try { 
        const dados = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (dados && Array.isArray(dados)) {
          alunos = dados;
        } else {
          alunos = [
            { id: 1, nome: "Ana Beatriz Silva", turma: "1ºA", status: "Ativo", criado: new Date().toISOString() },
            { id: 2, nome: "Carlos Eduardo Santos", turma: "1ºA", status: "Ativo", criado: new Date().toISOString() },
            { id: 3, nome: "Fernanda Lima", turma: "2ºB", status: "Ativo", criado: new Date().toISOString() },
            { id: 4, nome: "Gabriel Ferreira", turma: "3ºA", status: "Ativo", criado: new Date().toISOString() },
            { id: 5, nome: "Mariana Oliveira", turma: "1ºB", status: "Ativo", criado: new Date().toISOString() },
            { id: 6, nome: "Rafael Costa", turma: "2ºA", status: "Ativo", criado: new Date().toISOString() }
          ];
          saveAlunos();
        }
      }
      catch (e) { alunos = []; }
    }

    function saveAlunos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(alunos));
    }

    function showToast(msg, type = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      t.style.display = 'block';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.display = 'none'; }, 3200);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function removeAluno(id) {
      if (confirm('Remover este aluno da turma?')) {
        alunos = alunos.filter(a => a.id !== id);
        saveAlunos();
        renderTable();
        showToast('Aluno removido.', 'ok');
      }
    }

    function filtrarPorTurma() {
      turmaSelecionada = document.getElementById('inputTurma').value;
      document.getElementById('searchInput').value = '';
      renderTable();
    }

    function renderTable() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const tbody = document.getElementById('tableBody');
      const empty = document.getElementById('emptyState');
      const chip = document.getElementById('countChip');

      let filtered = alunos;
      
      if (turmaSelecionada) {
        filtered = filtered.filter(a => a.turma === turmaSelecionada);
      }
      
      if (q) {
        filtered = filtered.filter(a => a.nome.toLowerCase().includes(q));
      }

      const totalTurmas = [...new Set(alunos.map(a => a.turma))].length;
      chip.textContent = `${totalTurmas} turma${totalTurmas !== 1 ? 's' : ''}`;

      if (!filtered.length) {
        tbody.innerHTML = '';
        if (turmaSelecionada) {
          empty.style.display = 'flex';
          empty.querySelector('p').textContent = 'Nenhum aluno nesta turma';
          empty.querySelector('small').textContent = 'Selecione outra turma para visualizar';
        } else {
          empty.style.display = 'flex';
          empty.querySelector('p').textContent = 'Selecione uma turma';
          empty.querySelector('small').textContent = 'Escolha uma turma no campo acima para ver os alunos';
        }
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = filtered.map((a, i) => `
      <tr style="animation-delay:${i * 40}ms">
        <td class="td-num">${String(i + 1).padStart(2, '0')}</td>
        <td class="td-name">${escHtml(a.nome)}</td>
        <td><span class="td-turma"><i class="fas fa-chalkboard-user" style="font-size:.65rem"></i>${escHtml(a.turma)}</span></td>
        <td><span class="badge-status ativo"><span class="badge-status-dot"></span>Ativo</span></td>
        <td class="td-date">${formatDate(a.criado)}</td>
        <td><button class="btn-del" onclick="removeAluno(${a.id})" title="Remover"><i class="fas fa-trash-can"></i></button></td>
       </tr>
    `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

</script>
<script src="pwa.js"></script>
<script src="js/cursor.js"></script>
</body>
</html>
