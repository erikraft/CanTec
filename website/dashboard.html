<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <meta name="theme-color" content="#ff6600"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="CanTec"/>
    <title>Painel da Cantina - CanTec</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="img/logo.png">
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/cursor.css">
    <style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#04040a;font-family:'Segoe UI',system-ui,sans-serif;color:#f8fafc}
canvas#bg{position:absolute;inset:0;z-index:0}
.aurora{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.aurora span{position:absolute;border-radius:50%;opacity:0.18;filter:blur(80px);animation:drift 14s ease-in-out infinite alternate}
.aurora span:nth-child(1){width:600px;height:400px;background:#ff3333;top:-100px;left:-100px;animation-duration:13s}
.aurora span:nth-child(2){width:500px;height:500px;background:#ff6600;top:30%;right:-150px;animation-duration:17s;animation-delay:-4s}
.aurora span:nth-child(3){width:400px;height:350px;background:#ffcc00;bottom:-80px;left:30%;animation-duration:11s;animation-delay:-7s}
.aurora span:nth-child(4){width:350px;height:400px;background:#ff3333;bottom:10%;left:-80px;animation-duration:15s;animation-delay:-2s;opacity:0.1}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(60px,40px) scale(1.2)}}
.grid{position:absolute;inset:0;z-index:2;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,15,26,0.75);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1);padding:1rem 2rem;display:flex;align-items:center;justify-content:center;gap:.75rem}
.header-logo{width:42px;height:42px;object-fit:contain;border-radius:8px}
header h1{font-size:1.35rem;background:linear-gradient(135deg,#ff3333,#ff6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dashboard{position:absolute;inset:0;top:76px;z-index:10;display:flex;flex-direction:column;align-items:center;padding:1.5rem;overflow-y:auto}
.form-wrapper{background:rgba(15,15,26,0.65);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:1.6rem;max-width:760px;width:100%;animation:fadeUp .8s .2s ease forwards}
.section{margin-bottom:1.2rem;border-bottom:1px solid rgba(255,102,0,.25);padding-bottom:1rem}
.section:last-child{border-bottom:none;margin-bottom:0}
.section-title{font-size:.82rem;font-weight:700;text-transform:uppercase;color:#ff6600;margin-bottom:.8rem;letter-spacing:.04em}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.input-group{margin-bottom:.8rem}
.input-group label{display:block;font-size:.78rem;color:rgba(248,250,252,.8);margin-bottom:.4rem;text-transform:uppercase}
.input-group input{width:100%;padding:.75rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff}
.input-group input:focus{outline:none;border-color:rgba(255,102,0,.5)}
.readonly-box{padding:.9rem;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);border-radius:8px;color:#f8fafc}
.readonly-box small{display:block;color:rgba(248,250,252,.6);margin-top:.35rem}
.btn-group{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.8rem}
.btn{flex:1;min-width:120px;padding:.8rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;text-transform:uppercase;font-size:.8rem}
.btn-save{background:linear-gradient(135deg,#ff3333,#ff6600);color:#fff}
.btn-clear{background:rgba(255,204,0,.2);border:1px solid rgba(255,204,0,.5);color:#ffcc00}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#f8fafc}
.success-msg{display:none;padding:.9rem;border-radius:8px;margin-bottom:.9rem;font-size:.9rem}
.orb{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.08);pointer-events:none;z-index:3}
.orb-1{width:360px;height:360px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(255,51,51,.15);animation:orb-spin 28s linear infinite}
.orb-2{width:520px;height:520px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(255,102,0,.1);animation:orb-spin 44s linear infinite reverse}
@keyframes orb-spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.input-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="aurora"><span></span><span></span><span></span><span></span></div>
<div class="grid"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div>

<header>
  <img src="img/logo.png" alt="Logo CanTec" class="header-logo">
  <h1>Painel de Funcionário - CanTec</h1>
</header>

<div class="dashboard">
  <div class="form-wrapper">
    <div id="successMessage" class="success-msg"></div>

    <div class="section">
      <h3 class="section-title"><i class="fa-solid fa-store"></i> Comércio</h3>
      <div class="readonly-box" id="nomeComercioBox">Cantina Escola CanTec<small id="usuarioFuncionario"></small></div>
    </div>

    <form id="dashboardForm">
      <div class="section">
        <h3 class="section-title"><i class="fa-solid fa-user-tie"></i> Funcionário (cache)</h3>
        <div class="input-group">
          <label for="funcionarioUsername">Nome de usuário</label>
          <input type="text" id="funcionarioUsername" placeholder="Ex: joao.cantina" required>
        </div>
        <small style="color:rgba(248,250,252,.6)">Esse nome fica salvo no cache e não precisa digitar em todo pedido.</small>
      </div>

      <div class="section">
        <h3 class="section-title"><i class="fa-solid fa-user-graduate"></i> Aluno</h3>
        <div class="input-row">
          <div class="input-group">
            <label for="nomeAluno">Nome completo do aluno</label>
            <input type="text" id="nomeAluno" required placeholder="Nome completo">
          </div>
          <div class="input-group">
            <label for="telefoneAluno">Telefone do aluno</label>
            <input type="tel" id="telefoneAluno" placeholder="(11) 99999-9999">
          </div>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title"><i class="fa-solid fa-bag-shopping"></i> Pedido</h3>
        <div class="input-row">
          <div class="input-group">
            <label for="produto">Produto</label>
            <input type="text" id="produto" required placeholder="Ex: coxinha + suco">
          </div>
          <div class="input-group">
            <label for="preco">Preço (R$)</label>
            <input type="number" id="preco" step="0.01" min="0" required placeholder="0.00">
          </div>
        </div>
        <div class="input-row">
          <div class="input-group">
            <label for="quantidade">Quantidade</label>
            <input type="number" id="quantidade" min="1" value="1" required>
          </div>
          <div class="input-group">
            <label for="observacao">Observação</label>
            <input type="text" id="observacao" placeholder="Sem cebola, etc.">
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-save"><i class="fa-solid fa-floppy-disk"></i> Registrar Pedido</button>
        <button type="reset" class="btn btn-clear"><i class="fa-solid fa-trash"></i> Limpar</button>
        <button type="button" class="btn btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
      </div>
    </form>
  </div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [], mouse = {x: -9999, y: -9999};
const EMPLOYEE_CACHE_KEY = 'cantinaFuncionarioCache';
const ORDERS_KEY = 'cantinaPedidos';
const form = document.getElementById('dashboardForm');

function resize(){W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight;}
resize(); window.addEventListener('resize', resize);
for(let i=0;i<70;i++){particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.5+.4,a:Math.random()});}
(function draw(){ctx.clearRect(0,0,W,H);const LINK=130;for(let i=0;i<particles.length;i++){const p=particles[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,102,0,${0.35+p.a*0.3})`;ctx.fill();for(let j=i+1;j<particles.length;j++){const dx=p.x-particles[j].x,dy=p.y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<LINK){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(255,102,0,${0.12*(1-d/LINK)})`;ctx.lineWidth=0.6;ctx.stroke();}}}requestAnimationFrame(draw);}());

function sanitizeInput(value) { return String(value || '').replace(/[<>"']/g, '').trim(); }
function showSaveStatus(message, success = true) {
  const box = document.getElementById('successMessage');
  box.textContent = message;
  box.style.display = 'block';
  box.style.color = success ? '#4caf50' : '#f59e0b';
  box.style.border = success ? '1px solid rgba(76,175,80,.45)' : '1px solid rgba(245,158,11,.45)';
  box.style.background = success ? 'rgba(76,175,80,.15)' : 'rgba(245,158,11,.15)';
  setTimeout(() => box.style.display = 'none', 2600);
}

function loadEmployeeCache() {
  const cache = JSON.parse(localStorage.getItem(EMPLOYEE_CACHE_KEY) || '{}');
  document.getElementById('funcionarioUsername').value = cache.username || '';

  const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
  document.getElementById('usuarioFuncionario').textContent = currentUser.nome
    ? `Logado como: ${currentUser.nome}`
    : 'Logado como funcionário';
}

function saveEmployeeCache() {
  localStorage.setItem(EMPLOYEE_CACHE_KEY, JSON.stringify({
    username: sanitizeInput(document.getElementById('funcionarioUsername').value)
  }));
}

function saveOrder() {
  const username = sanitizeInput(document.getElementById('funcionarioUsername').value);
  if (!username) {
    showSaveStatus('Informe o nome de usuário do funcionário.', false);
    return;
  }

  const pedido = {
    id: `pedido-${Date.now()}`,
    criadoEm: new Date().toISOString(),
    comercio: 'Cantina Escola CanTec',
    funcionarioUsername: username,
    alunoNomeCompleto: sanitizeInput(document.getElementById('nomeAluno').value),
    alunoTelefone: sanitizeInput(document.getElementById('telefoneAluno').value),
    produto: sanitizeInput(document.getElementById('produto').value),
    preco: Number(document.getElementById('preco').value || 0),
    quantidade: Number(document.getElementById('quantidade').value || 1),
    observacao: sanitizeInput(document.getElementById('observacao').value)
  };

  const pedidos = JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]');
  pedidos.push(pedido);
  localStorage.setItem(ORDERS_KEY, JSON.stringify(pedidos));
  saveEmployeeCache();
  showSaveStatus(`Pedido registrado para ${pedido.alunoNomeCompleto}. Total no histórico: ${pedidos.length}`);

  document.getElementById('nomeAluno').value = '';
  document.getElementById('telefoneAluno').value = '';
  document.getElementById('produto').value = '';
  document.getElementById('preco').value = '';
  document.getElementById('quantidade').value = '1';
  document.getElementById('observacao').value = '';
  document.getElementById('nomeAluno').focus();
}

form.addEventListener('submit', (event) => {
  event.preventDefault();
  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }
  saveOrder();
});

form.addEventListener('reset', () => {
  setTimeout(() => {
    document.getElementById('quantidade').value = '1';
    showSaveStatus('Campos limpos. Nome de usuário permanece no cache.');
  }, 0);
});

window.addEventListener('load', () => {
  const role = localStorage.getItem('userRole');
  if (localStorage.getItem('userSession') !== 'logado' || role !== 'funcionario') {
    window.location.href = 'account.html';
    return;
  }
  loadEmployeeCache();
});

function logout() {
  localStorage.removeItem('userSession');
  localStorage.removeItem('currentUser');
  localStorage.removeItem('userRole');
  window.location.href = 'index.html';
}
</script>
<script src="pwa.js"></script>
<script src="js/cursor.js"></script>
</body>
</html>
