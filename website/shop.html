<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#ff6600"/>
  <title>Fazer Pedido - CanTec</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a14 0%, #0f0f1a 100%);
      color: #f8fafc;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Background particles effect */
    .particles-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(255, 102, 0, 0.3);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 0.6; }
    }

    /* Main container */
    .main-container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header */
    .glass-header {
      background: rgba(15, 15, 26, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 102, 0, 0.3);
      border-radius: 20px;
      padding: 1rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #ff3333, #ff6600);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
    }

    .title h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4444, #ff6600 55%, #ffcc00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title p {
      font-size: 0.8rem;
      color: rgba(248, 250, 252, 0.6);
      margin-top: 0.2rem;
    }

    /* Botão de histórico - Design renovado */
    .btn-history {
      background: rgba(255, 102, 0, 0.15);
      border: 1.5px solid rgba(255, 102, 0, 0.5);
      color: #ffcc00;
      padding: 0.6rem 1.4rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .btn-history::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 102, 0, 0.4);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .btn-history:hover::before {
      width: 200px;
      height: 200px;
    }

    .btn-history:hover {
      background: rgba(255, 102, 0, 0.3);
      border-color: rgba(255, 102, 0, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 102, 0, 0.3);
      color: #ffdd88;
    }

    .btn-history:active {
      transform: translateY(0);
    }

    .btn-history i {
      font-size: 1rem;
      transition: transform 0.3s ease;
    }

    .btn-history:hover i {
      transform: translateX(-3px);
    }

    /* Formulário de compra */
    .buy-form-section {
      background: rgba(15, 15, 26, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 102, 0, 0.3);
      border-radius: 20px;
      padding: 2rem;
      transition: all 0.3s ease;
    }

    .buy-form-section:hover {
      border-color: rgba(255, 102, 0, 0.5);
      box-shadow: 0 10px 40px rgba(255, 102, 0, 0.2);
    }

    .form-title {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 102, 0, 0.2);
    }

    .form-title i {
      font-size: 1.8rem;
      color: #ff6600;
    }

    .form-title h2 {
      font-size: 1.3rem;
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(248, 250, 252, 0.7);
    }

    .input-group input,
    .input-group select {
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #f8fafc;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .input-group select option {
      background: #1a1a2e;
      color: #f8fafc;
      padding: 0.5rem;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: rgba(255, 102, 0, 0.6);
      box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
    }

    .input-group input::placeholder {
      color: rgba(248, 250, 252, 0.3);
    }

    .price-preview {
      background: rgba(255, 102, 0, 0.1);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .price-preview span {
      font-size: 0.85rem;
      color: rgba(248, 250, 252, 0.6);
    }

    .price-preview strong {
      font-size: 1.6rem;
      color: #4ade80;
      margin-left: 0.5rem;
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #ff3333, #ff6600);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 102, 0, 0.4);
    }

    /* Modal de notificação */
    .modal-notification {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-notification.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: rgba(15, 15, 26, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(76, 175, 80, 0.5);
      border-radius: 20px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
      transform: scale(0.7);
      transition: transform 0.3s ease;
    }

    .modal-notification.show .modal-content {
      transform: scale(1);
    }

    .modal-icon {
      font-size: 4rem;
      color: #4ade80;
      margin-bottom: 1rem;
    }

    .modal-content h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #4ade80;
    }

    .modal-content p {
      color: rgba(248, 250, 252, 0.8);
      margin-bottom: 1rem;
    }

    .modal-details {
      background: rgba(255, 102, 0, 0.1);
      border-radius: 12px;
      padding: 1rem;
      margin: 1rem 0;
    }

    .modal-details p {
      margin: 0.3rem 0;
      color: #ffcc00;
    }

    .btn-modal {
      background: linear-gradient(135deg, #ff3333, #ff6600);
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .btn-modal:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 102, 0, 0.4);
    }

    /* Toast message (para erros) */
    .toast-message {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(15, 15, 26, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(239, 68, 68, 0.5);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      color: #f87171;
      font-weight: 600;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      display: none;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 102, 0, 0.5);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 102, 0, 0.7);
    }

    /* Responsividade */
    @media (max-width: 768px) {
      .main-container {
        padding: 1rem;
      }
      
      .glass-header {
        padding: 1rem;
      }
      
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="particles-bg" id="particles"></div>

<div class="main-container">
  <!-- Header -->
  <div class="glass-header">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-utensils"></i>
      </div>
      <div class="title">
        <h1>Fazer Pedido</h1>
        <p>Escolha seu produto e faça seu pedido</p>
      </div>
    </div>
    <button class="btn-history" onclick="window.location.href='pedidos.html'">
      <i class="fas fa-history"></i>
      Histórico
    </button>
  </div>

  <!-- Formulário de Compra -->
  <div class="buy-form-section">
    <div class="form-title">
      <i class="fas fa-cart-plus"></i>
      <h2>Novo Pedido</h2>
    </div>
    
    <div class="form-grid">
      <div class="input-group">
        <label><i class="fas fa-utensils"></i> Produto</label>
        <select id="produtoSelect">
          <option value="" disabled selected>Selecione um produto</option>
          <option value="Coxinha" data-preco="5.00">🍗 Coxinha - R$ 5,00</option>
          <option value="Pastel" data-preco="6.00">🥟 Pastel - R$ 6,00</option>
          <option value="Hambúrguer" data-preco="12.00">🍔 Hambúrguer - R$ 12,00</option>
          <option value="Pizza Slice" data-preco="8.00">🍕 Pizza Slice - R$ 8,00</option>
          <option value="Suco Natural" data-preco="4.50">🥤 Suco Natural - R$ 4,50</option>
          <option value="Refrigerante" data-preco="5.00">🥤 Refrigerante - R$ 5,00</option>
          <option value="Água" data-preco="2.50">💧 Água - R$ 2,50</option>
          <option value="Bolo" data-preco="4.00">🍰 Bolo - R$ 4,00</option>
          <option value="Sanduíche" data-preco="7.00">🥪 Sanduíche - R$ 7,00</option>
          <option value="Salada de Frutas" data-preco="6.50">🍎 Salada de Frutas - R$ 6,50</option>
          <option value="Hot Dog" data-preco="8.00">🌭 Hot Dog - R$ 8,00</option>
          <option value="Batata Frita" data-preco="7.00">🍟 Batata Frita - R$ 7,00</option>
          <option value="Empada" data-preco="5.50">🥧 Empada - R$ 5,50</option>
          <option value="Torta Salgada" data-preco="6.00">🥧 Torta Salgada - R$ 6,00</option>
          <option value="Chocolate" data-preco="3.50">🍫 Chocolate - R$ 3,50</option>
        </select>
      </div>
      
      <div class="input-group">
        <label><i class="fas fa-hashtag"></i> Quantidade</label>
        <input type="number" id="quantidadeInput" min="1" value="1" step="1">
      </div>
    </div>

    <div class="price-preview">
      <span>Valor total:</span>
      <strong id="precoTotal">R$ 0,00</strong>
    </div>

    <button class="btn-submit" onclick="fazerPedido()">
      <i class="fas fa-check-circle"></i>
      Confirmar Pedido
    </button>
  </div>
</div>

<!-- Modal de Notificação -->
<div id="notificationModal" class="modal-notification">
  <div class="modal-content">
    <div class="modal-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <h3>Pedido Realizado!</h3>
    <p>Seu pedido foi confirmado com sucesso</p>
    <div id="modalDetails" class="modal-details"></div>
    <button class="btn-modal" onclick="fecharModal()">
      <i class="fas fa-check"></i> OK
    </button>
  </div>
</div>

<div id="toastMessage" class="toast-message"></div>

<script>
const ORDERS_KEY = 'cantinaPedidos';

function showToast(message, isError = false) {
  const toast = document.getElementById('toastMessage');
  toast.textContent = message;
  toast.style.borderColor = isError ? 'rgba(239, 68, 68, 0.5)' : 'rgba(76, 175, 80, 0.5)';
  toast.style.color = isError ? '#f87171' : '#4ade80';
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}

function showModal(produto, quantidade, precoTotal) {
  const modal = document.getElementById('notificationModal');
  const modalDetails = document.getElementById('modalDetails');
  
  modalDetails.innerHTML = `
    <p><i class="fas fa-hamburger"></i> Produto: <strong>${produto}</strong></p>
    <p><i class="fas fa-hashtag"></i> Quantidade: <strong>${quantidade}x</strong></p>
    <p><i class="fas fa-tag"></i> Valor total: <strong>R$ ${precoTotal.toFixed(2)}</strong></p>
    <p><i class="fas fa-clock"></i> ${new Date().toLocaleTimeString('pt-BR')}</p>
  `;
  
  modal.classList.add('show');
}

function fecharModal() {
  const modal = document.getElementById('notificationModal');
  modal.classList.remove('show');
  
  // Limpar formulário
  document.getElementById('produtoSelect').value = '';
  document.getElementById('quantidadeInput').value = '1';
  document.getElementById('precoTotal').textContent = 'R$ 0,00';
}

function calcularPrecoTotal() {
  const select = document.getElementById('produtoSelect');
  const quantidade = parseInt(document.getElementById('quantidadeInput').value) || 1;
  const selectedOption = select.options[select.selectedIndex];
  
  if (selectedOption && selectedOption.value) {
    const precoUnitario = parseFloat(selectedOption.getAttribute('data-preco'));
    const total = precoUnitario * quantidade;
    document.getElementById('precoTotal').textContent = `R$ ${total.toFixed(2)}`;
  } else {
    document.getElementById('precoTotal').textContent = 'R$ 0,00';
  }
}

function fazerPedido() {
  const produtoSelect = document.getElementById('produtoSelect');
  const produto = produtoSelect.value;
  const quantidade = parseInt(document.getElementById('quantidadeInput').value);
  const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
  const selectedOption = produtoSelect.options[produtoSelect.selectedIndex];
  
  if (!produto) {
    showToast('❌ Selecione um produto!', true);
    return;
  }
  
  if (!quantidade || quantidade < 1) {
    showToast('❌ Quantidade inválida!', true);
    return;
  }
  
  const precoUnitario = parseFloat(selectedOption.getAttribute('data-preco'));
  const precoTotal = precoUnitario * quantidade;
  
  const novoPedido = {
    id: Date.now(),
    alunoNomeCompleto: currentUser.nome || 'Aluno',
    produto: produto,
    quantidade: quantidade,
    preco: precoTotal,
    comercio: 'Cantina',
    funcionarioUsername: 'Sistema',
    criadoEm: new Date().toISOString(),
    observacao: ''
  };
  
  const pedidosExistentes = JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]');
  pedidosExistentes.push(novoPedido);
  localStorage.setItem(ORDERS_KEY, JSON.stringify(pedidosExistentes));
  
  // Mostrar modal de notificação
  showModal(produto, quantidade, precoTotal);
}

function createParticles() {
  const particleContainer = document.getElementById('particles');
  particleContainer.innerHTML = '';
  for (let i = 0; i < 50; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    const size = Math.random() * 4 + 1;
    particle.style.width = `${size}px`;
    particle.style.height = `${size}px`;
    particle.style.left = `${Math.random() * 100}%`;
    particle.style.top = `${Math.random() * 100}%`;
    particle.style.animationDelay = `${Math.random() * 5}s`;
    particle.style.animationDuration = `${Math.random() * 4 + 4}s`;
    particleContainer.appendChild(particle);
  }
}

window.addEventListener('load', () => {
  const role = localStorage.getItem('userRole');
  if (localStorage.getItem('userSession') !== 'logado' || role !== 'aluno') {
    window.location.href = 'account.html';
    return;
  }
  createParticles();
  
  document.getElementById('produtoSelect').addEventListener('change', calcularPrecoTotal);
  document.getElementById('quantidadeInput').addEventListener('input', calcularPrecoTotal);
});
</script>
</body>
</html>
